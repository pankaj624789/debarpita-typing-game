<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Working Chess - Pankaj</title>

<!-- Chessboard CSS -->
<link rel="stylesheet"
href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">

<style>
body{
    margin:0;
    background:linear-gradient(135deg,#141e30,#243b55);
    font-family:Arial;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    height:100vh;
    color:white;
}

#board{ width:400px; }

button{
    margin-top:15px;
    padding:10px 25px;
    border:none;
    border-radius:25px;
    background:linear-gradient(45deg,#ff416c,#ff4b2b);
    color:white;
    cursor:pointer;
}

#status{ margin-top:10px; }
</style>
</head>

<body>

<h2>♟️ Pro Chess</h2>
<div id="board"></div>
<div id="status"></div>
<button onclick="resetGame()">Restart</button>

<!-- REQUIRED LIBRARIES -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<!-- FIXED chess.js CDN -->
<script src="https://unpkg.com/chess.js@0.13.4/chess.min.js"></script>

<!-- FIXED chessboard.js CDN -->
<script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

<script>
var board = null;
var game = new Chess();

function updateStatus() {
  var status = '';

  if (game.in_checkmate()) {
    status = 'Checkmate!';
  } else if (game.in_check()) {
    status = 'Check!';
  } else {
    status = game.turn() === 'w' ? 'Your Move (White)' : 'Computer Move (Black)';
  }

  document.getElementById("status").innerHTML = status;
}

function onDragStart (source, piece) {
  if (game.game_over()) return false;
  if (piece.search(/^b/) !== -1) return false;
}

function onDrop (source, target) {
  var move = game.move({
    from: source,
    to: target,
    promotion: 'q'
  });

  if (move === null) return 'snapback';

  updateStatus();
  window.setTimeout(makeRandomMove, 300);
}

function makeRandomMove(){
  var possibleMoves = game.moves();
  if (possibleMoves.length === 0) return;

  var randomMove = possibleMoves[Math.floor(Math.random() * possibleMoves.length)];
  game.move(randomMove);
  board.position(game.fen());
  updateStatus();
}

function resetGame(){
  game.reset();
  board.start();
  updateStatus();
}

var config = {
  draggable: true,
  position: 'start',
  onDragStart: onDragStart,
  onDrop: onDrop
};

board = Chessboard('board', config);
updateStatus();
</script>

</body>
</html>
