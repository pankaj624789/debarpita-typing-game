<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offline Chess - Pankaj</title>

<style>
body{
    margin:0;
    background:linear-gradient(135deg,#141e30,#243b55);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    height:100vh;
    font-family:Arial;
    color:white;
}

#board{
    display:grid;
    grid-template-columns:repeat(8,60px);
    grid-template-rows:repeat(8,60px);
    border:4px solid white;
}

.square{
    width:60px;
    height:60px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:36px;
    cursor:pointer;
}

.light{ background:#f0d9b5; }
.dark{ background:#b58863; }

.selected{
    box-shadow:inset 0 0 10px yellow;
}

button{
    margin-top:15px;
    padding:10px 25px;
    border:none;
    border-radius:25px;
    background:linear-gradient(45deg,#ff416c,#ff4b2b);
    color:white;
    cursor:pointer;
}

#status{ margin-top:10px; }
</style>
</head>

<body>

<h2>♟️ Offline Chess</h2>
<div id="board"></div>
<div id="status"></div>
<button onclick="init()">Restart</button>

<script>
const boardEl = document.getElementById("board");
const statusEl = document.getElementById("status");

let board = [];
let selected = null;
let turn = "white";

const pieces = {
    r:"♜", n:"♞", b:"♝", q:"♛", k:"♚", p:"♟",
    R:"♖", N:"♘", B:"♗", Q:"♕", K:"♔", P:"♙"
};

function init(){
    board = [
        ["r","n","b","q","k","b","n","r"],
        ["p","p","p","p","p","p","p","p"],
        ["","","","","","","",""],
        ["","","","","","","",""],
        ["","","","","","","",""],
        ["","","","","","","",""],
        ["P","P","P","P","P","P","P","P"],
        ["R","N","B","Q","K","B","N","R"]
    ];
    turn = "white";
    selected = null;
    draw();
}

function draw(){
    boardEl.innerHTML="";
    statusEl.innerText="Turn: "+turn;

    for(let r=0;r<8;r++){
        for(let c=0;c<8;c++){
            const sq=document.createElement("div");
            sq.className="square "+((r+c)%2==0?"light":"dark");
            sq.dataset.r=r;
            sq.dataset.c=c;

            let piece=board[r][c];
            if(piece) sq.innerText=pieces[piece];

            sq.onclick=clickSquare;
            boardEl.appendChild(sq);
        }
    }
}

function clickSquare(){
    let r=this.dataset.r;
    let c=this.dataset.c;
    let piece=board[r][c];

    if(selected){
        board[r][c]=board[selected.r][selected.c];
        board[selected.r][selected.c]="";
        selected=null;
        turn = turn==="white"?"black":"white";
        draw();
        if(turn==="black") setTimeout(aiMove,500);
        return;
    }

    if(!piece) return;

    if(turn==="white" && piece===piece.toUpperCase())
        selected={r,c};

    if(turn==="black" && piece===piece.toLowerCase())
        selected={r,c};
}

function aiMove(){
    let moves=[];
    for(let r=0;r<8;r++){
        for(let c=0;c<8;c++){
            if(board[r][c] && board[r][c]===board[r][c].toLowerCase()){
                moves.push({r,c});
            }
        }
    }
    if(moves.length===0) return;

    let pick=moves[Math.floor(Math.random()*moves.length)];
    let newR=Math.floor(Math.random()*8);
    let newC=Math.floor(Math.random()*8);

    board[newR][newC]=board[pick.r][pick.c];
    board[pick.r][pick.c]="";
    turn="white";
    draw();
}

init();
</script>

</body>
</html>
